services:
  app:
    image: onetimesecret/onetimesecret:v0.22.0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      HOST: "${DOMAIN:-secret.example.com}"
      SSL: "true"
      COLONEL: "${ADMIN_EMAIL:-admin@example.com}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0"
      SECRET: "${SECRET_KEY:-replace-with-32-plus-random-chars}"
      RACK_ENV: "production"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v2/status"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      simpledeploy.endpoints.0.domain: "${DOMAIN:-secret.example.com}"
      simpledeploy.endpoints.0.port: "3000"
      simpledeploy.endpoints.0.tls: "auto"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
