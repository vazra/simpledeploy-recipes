services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    restart: unless-stopped
    environment:
      INIT_ENABLED: "true"
      INIT_HOST: "${WG_HOST:-vpn.example.com}"
      INIT_PORT: "51820"
      INIT_DNS: "1.1.1.1,1.0.0.1"
      INIT_IPV4_CIDR: "10.8.0.0/24"
      PORT: "51821"
    volumes:
      - wg-data:/etc/wireguard
    ports:
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:51821/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      simpledeploy.endpoints.0.domain: "${DOMAIN:-vpn.example.com}"
      simpledeploy.endpoints.0.port: "51821"
      simpledeploy.endpoints.0.tls: "auto"

volumes:
  wg-data:
