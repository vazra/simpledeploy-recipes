name: Mirror recipe images to GHCR

# Mirrors Docker Hub images referenced by recipe compose files into
# ghcr.io/vazra/simpledeploy-mirror/... so users / E2E runs are not
# blocked by Docker Hub pull rate limits. Also usable for local dev by
# setting SIMPLEDEPLOY_IMAGE_MIRROR_PREFIX on the simpledeploy binary.
#
# Triggers:
#   - changes to recipes/**
#   - changes to scripts/list-mirror-images.mjs
#   - changes to this workflow
#   - manual dispatch

on:
  push:
    branches: [main]
    paths:
      - 'recipes/**'
      - 'scripts/list-mirror-images.mjs'
      - '.github/workflows/mirror-images.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-push even if destination tag already exists'
        type: boolean
        default: false

concurrency:
  group: mirror-images
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      MIRROR_PREFIX: ghcr.io/${{ github.repository_owner }}/simpledeploy-mirror
      FORCE: ${{ inputs.force }}
      ACTOR: ${{ github.actor }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install deps
        run: npm ci

      - name: Collect image list
        run: |
          node scripts/list-mirror-images.mjs > /tmp/images.txt
          echo "Images to mirror:"
          cat /tmp/images.txt

      - name: Install skopeo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Log in to GHCR
        run: |
          printf '%s' "$GH_TOKEN" | skopeo login ghcr.io --username "$ACTOR" --password-stdin

      - name: Copy images
        run: |
          set -u
          failed=0
          total=0
          skipped=0
          copied=0
          lc_prefix=$(printf '%s' "$MIRROR_PREFIX" | tr '[:upper:]' '[:lower:]')
          while IFS= read -r img; do
            [ -z "$img" ] && continue
            total=$((total+1))
            norm="${img#docker.io/}"
            norm="${norm#library/}"
            dst="${lc_prefix}/${norm}"
            echo "::group::mirror $img -> $dst"
            if [ "${FORCE:-false}" != "true" ] && skopeo inspect --no-tags "docker://${dst}" >/dev/null 2>&1; then
              echo "already exists at destination, skipping"
              skipped=$((skipped+1))
              echo "::endgroup::"
              continue
            fi
            ok=0
            for attempt in 1 2 3; do
              if skopeo copy --all --retry-times 3 \
                  "docker://${img}" "docker://${dst}"; then
                ok=1
                break
              fi
              echo "copy attempt ${attempt} failed; sleeping before retry"
              sleep $((attempt * 5))
            done
            if [ "$ok" = 1 ]; then
              copied=$((copied+1))
            else
              echo "::error::failed to copy $img"
              failed=$((failed+1))
            fi
            echo "::endgroup::"
          done < /tmp/images.txt
          echo ""
          echo "Summary: total=$total copied=$copied skipped=$skipped failed=$failed"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi
